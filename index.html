<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta de Shadowx065 - v7 Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Roboto:wght@400;700&family=Orbitron:wght@400;700&family=Playfair+Display:wght@400;700&family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="confettiCanvas"></canvas>
    
    <div class="app-wrapper">
        <header class="main-header">
            <h1 id="dynamicTitle" class="app-title">Ruleta de Shadowx065</h1>
            <div class="header-controls">
                <button id="fullscreenBtn" class="btn-pill">⛶ Pantalla</button>
                <div class="control-item">
                    <span>🔊</span>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.3">
                </div>
                <select id="fontSelect" class="btn-pill">
                    <option value="'Poppins', sans-serif">Poppins</option>
                    <option value="'Roboto', sans-serif">Roboto</option>
                    <option value="'Orbitron', sans-serif">Orbitron</option>
                    <option value="'Playfair Display', serif">Playfair</option>
                    <option value="'Bangers', system-ui">Bangers</option>
                </select>
                <select id="themeSelect" class="btn-pill">
                    <option value="Shadow">Shadow</option>
                    <option value="Adson">Adson</option>
                    <option value="Cuyorito">Cuyorito</option>
                    <option value="GioFresh">GioFresh</option>
                    <option value="Kitzia">Kitzia</option>
                </select>
                <button id="musicBtn" class="btn-pill">Música: OFF</button>
            </div>
        </header>

        <main class="main-layout">
            <aside class="side-panel">
                <h3>Opciones (<span id="optCount">0</span>)</h3>
                <div class="input-group">
                    <textarea id="optionInput" placeholder="Escribe aquí o pega una lista..." rows="1"></textarea>
                    <button id="addBtn">AÑADIR</button>
                </div>
                <ul id="optionsList" class="scroll-list"></ul>
                <button id="resetBtn" class="btn-danger">REINICIAR TODO</button>
            </aside>

            <section class="wheel-area">
                <div class="wheel-container">
                    <div class="marker"></div>
                    <canvas id="wheelCanvas" width="600" height="600"></canvas>
                    <button id="spinBtn">GIRAR</button>
                </div>
            </section>

            <aside class="side-panel">
                <div class="panel-header">
                    <h3>Historial</h3>
                    <button id="clearHistoryBtn" class="btn-text">Borrar</button>
                </div>
                <ul id="historyList" class="scroll-list"></ul>
            </aside>
        </main>
    </div>

    <div id="winnerModal" class="modal">
        <div class="modal-content">
            <div class="win-label">¡GANADOR!</div>
            <h2 id="winnerName"></h2>
            <div class="modal-btns">
                <button id="closeModal" class="btn-pill">CONTINUAR</button>
                <button id="removeWinnerBtn" class="btn-pill btn-danger">ELIMINAR ESTE</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic" src="After Dark (8 Bit Cover).mp3" loop></audio>
    <audio id="spinSound" src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3" preload="auto"></audio>
    <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
